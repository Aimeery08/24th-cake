<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title> Kung mahal mo ako mag message ka... 🎂</title>

<style>

    .balloon{
    position:fixed;
    bottom:-100px;
    font-size:50px;
    animation:floatUp 3s ease-out forwards;
    z-index:999;
}

@keyframes floatUp{
    0%{
        transform:translateY(0);
        opacity:1;
    }

    100%{
        transform:translateY(-800px);
        opacity:0;
    }
}
    
body{
    margin:0;
    font-family:Georgia, serif;
    background-image:url("cake.png");
    background-size:cover;
    background-position:center;
    background-attachment:fixed;
    color:#222;
    display:flex;
    justify-content:center;
}

.container{
    width:700px;
    max-width:90%;
    margin:60px auto;
}

h1{
    font-size:3rem;
    margin-bottom:10px;
}

p{
    color:#F52780;
}

textarea{
    width:100%;
    height:160px;
    margin-top:20px;
    font-size:18px;
    padding:15px;
    border-radius:10px;
    border:1px solid #ccc;
    resize:none;
}

button{
    margin-top:15px;
    padding:12px 25px;
    font-size:18px;
    cursor:pointer;
    border:none;
    border-radius:10px;
    background:#F52780;
    color:white;
    transition:0.3s;
}

button:hover{
    transform:scale(1.05);
}

button.sent{
    background:#8BC34A;
}

#messages{
    margin-top:50px;
}

.message{
    background:white;
    padding:20px;
    border-radius:12px;
    margin-bottom:15px;
    box-shadow:0 4px 10px rgba(0,0,0,.08);
}
</style>

</head>
<body>

<div class="container">

<h1>BIRTHDAY NI AIMS.. 24 NA SHA ????</h1>

<p>
Hello!! 24 na ako.. send gcash joke send your sweet messages, kasing sweet netong cassava cake na nasa background!
</p>

<textarea id="textbox" placeholder="Write something..."></textarea>

<button onclick="addMessage()">Leave Message</button>

<div id="messages"></div>

</div>

<script>

    function createBalloon(){

    const balloon=document.createElement("div");

    balloon.className="balloon";
    balloon.innerHTML="🎈";

    balloon.style.left=Math.random()*90+"vw";

    document.body.appendChild(balloon);

    setTimeout(()=>{
        balloon.remove();
    },3000);

}

async function addMessage(){

const text = document.getElementById("textbox").value.trim();

if(text === ""){
    alert("Please write a message first ❤️");
for(let i = 0; i < 10; i++){
    setTimeout(createBalloon, i * 150);
}
    return;
}

await fetch("https://script.google.com/macros/s/AKfycbyrL8P1wO6yiy8MkOPcBI-sN8GMr0_JHglCoaTbQ3GDSE4OZrEWT4d5dCZb-6So_LNPwg/exec", {

    method:"POST",

    body:JSON.stringify({
        message:text
    })

});


const button = document.querySelector("button");

button.classList.add("sent");
button.textContent="Sent! 💌";


alert("N4paDUhLhAA na P0WXz anG iy0nG m3Ns4h3 to my international friends this means your message was sent haha! 🎂");


document.getElementById("textbox").value="";


setTimeout(()=>{

button.classList.remove("sent");
button.textContent="Leave Message";

},3000);


}

</script>

</body>
</html>
