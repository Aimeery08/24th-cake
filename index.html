<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leave Me a Birthday Message 🎂</title>

<style>
body{
    margin:0;
    font-family:Georgia, serif;
    background-image:url("cake.png");
    background-size:cover;
    background-position:center;
    background-attachment:fixed;
    color:#222;
    display:flex;
    justify-content:center;
}

.container{
    width:700px;
    max-width:90%;
    margin:60px auto;
}

h1{
    font-size:3rem;
    margin-bottom:10px;
}

p{
    color:#F52780;
}

textarea{
    width:100%;
    height:160px;
    margin-top:20px;
    font-size:18px;
    padding:15px;
    border-radius:10px;
    border:1px solid #ccc;
    resize:none;
}

button{
    margin-top:15px;
    padding:12px 25px;
    font-size:18px;
    cursor:pointer;
    border:none;
    border-radius:10px;
    background:#F52780;
    color:white;
    transition:0.3s;
}

button:hover{
    transform:scale(1.05);
}

button.sent{
    background:#8BC34A;
}

#messages{
    margin-top:50px;
}

.message{
    background:white;
    padding:20px;
    border-radius:12px;
    margin-bottom:15px;
    box-shadow:0 4px 10px rgba(0,0,0,.08);
}
</style>

</head>
<body>

<div class="container">

<h1>🎂 Happy Birthday to Me</h1>

<p>
Leave me a note. It can be long, short, weird, funny,
or something you've never told me before.
</p>

<textarea id="textbox" placeholder="Write something..."></textarea>

<button onclick="addMessage()">Leave Message</button>

<div id="messages"></div>

</div>

<script>

function addMessage(){

const text=document.getElementById("textbox").value.trim();

if(text===""){
    alert("Please write a message first ❤️");
    return;
}

const div=document.createElement("div");
div.className="message";
div.textContent=text;

document.getElementById("messages").prepend(div);

document.getElementById("textbox").value="";

const button=document.querySelector("button");

button.classList.add("sent");
button.textContent="Sent! 💌";

alert("Your message is sent! 🎂");

setTimeout(() => {
    button.classList.remove("sent");
    button.textContent="Leave Message";
}, 3000);

}

</script>

</body>
</html>
